server {
  listen 8085;
  client_max_body_size 120m;

  location = /api/user {
    return 301 /api/user/;
  }
  location = /api/quiz {
    return 301 /api/quiz/;
  }
  location = /api/class {
    return 301 /api/class/;
  }
  location = /api/ai {
    return 301 /api/ai/;
  }
  location = /api/game {
    return 301 /api/game/;
  }
  location = /phone-app {
    return 301 /phone-web/;
  }
  location = /phone-app/ {
    return 301 /phone-web/;
  }
  location = /phone-web {
    return 301 /phone-web/;
  }

  location /api/user/ {
    proxy_pass http://user-service:7301/;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port $server_port;
  }

  location /api/quiz/ {
    proxy_pass http://quiz-service:7302/;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port $server_port;
  }

  location /api/class/ {
    proxy_pass http://class-service:7303/;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port $server_port;
  }

  location /api/ai/ {
    proxy_pass http://ai-service:7304/;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port $server_port;
  }

  location /api/game/ {
    proxy_pass http://game-service:7305/;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port $server_port;
  }

  location /phone-web/ {
    proxy_pass http://phone-web-app:8080/;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port $server_port;
  }

  location / {
    proxy_pass http://web-app:3000/;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port $server_port;
  }
}
